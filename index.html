<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/css.css">
    <title>Jewellery</title>
</head>
  
  
<body>
    <div class="black hero">
        <header>
            <div class="container">
                <div class="header">
                    <div class="header_logo">
                        <img src="images/logo.svg" alt="logo" width="30%"></div>
                    <div class="header_nav">
                        <nav class="nav">
                            <a href="#" class="nav_link">HOME</a>
                            <a href="#catalog" class="nav_link">CATALOGUE</a>
                            <a href="#" class="nav_link">CONTACT</a>
                            <a href="#" class="nav_link">CART (<span id="cart-count">0</span>)</a>
                            <button id="theme-btn">🌙</button>
                        </nav>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <div class="container">
                <div class="main">
                    <div class="main_text">
                        <h1 class="title-h1">JEWELLERY</h1>
                        <p>new collection</p>
                        <a href="#catalog">
                            <button class="hover hero-btn">SHOP</button> 
                        </a>
                    </div>
                    <!-- <div class="main_cover">
                        <img src="images/cover.png" alt="" width="120%">
                    </div> -->
                </div>
            </div>
        </main>
    </div>
    <div class="bestsellers">
        <h2 class="title-h2">BESTSELLERS</h2>
    </div>
    <div class="card_container" id="catalog">
        <div class="card">
            <span class="like">♡</span>
            <img src="images/earrings.png" alt="earrings">
            <div class="card-content">
                <h3>EARRINGS</h3>
                <p>silver</p>
                <button class="buy">BUY NOW</button> 
            </div>
        </div>
        <div class="card">
            <span class="like">♡</span>
            <img src="images/bracelet.png" alt="bracelet">
            <div class="card-content">
                <h3>BRACELET</h3>
                <p>silver</p>
                <button class="buy">BUY NOW</button>  
            </div>
        </div>
        <div class="card">
            <span class="like">♡</span>
            <img src="images/necklace.png" alt="necklace">
            <div class="card-content">
                <h3>NECKLACE</h3>
                <p>silver</p>
                <button class="buy">BUY NOW</button>  
            </div>
        </div>
    </div>
    <div class="form-section">
        <div class="container">
            <h2 class="title-h2">CONTACT US</h2>

            <form class="form">
                <input type="text" placeholder="Your name">
                <input type="email" placeholder="Your email">
                
                <select>
                    <option>Choose item</option>
                    <option>Earrings</option>
                    <option>Bracelet</option>
                    <option>Necklace</option>
                </select>
                <input type="number" placeholder="Quantity">
                <textarea placeholder="Your message"></textarea>
                <button class="buy">SEND</button>
            </form>
        </div>
    </div>
    <div class="container">
        <div class="main">
            <div class="main_text">
                <h2 class="title-h2">MORE ITEMS SOON</h2>
                <p class="main_desc">thank you for supporting us!</p>
            </div>
        </div>
    </div>
    <footer>
        <div class="black">
            <div class="container">
                <div class="footer">
                    <p>+1 111-111-11 11</p>
                    <p>2026 JEWELLERY</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let cartCount = 0;
        let buttons = document.querySelectorAll(".buy");
        let cart = document.getElementById("cart-count");

        buttons.forEach(function(button) {

            button.addEventListener("click", function() {
                cartCount = cartCount + 1;
                cart.textContent = cartCount;
            });

            button.addEventListener("contextmenu", function(event) {
                event.preventDefault();

                if (cartCount > 0) {
                    cartCount = cartCount - 1;
                    cart.textContent = cartCount;
                }
            });
        });

        let likes = document.querySelectorAll(".like");

        likes.forEach(function(like) {
            like.addEventListener("click", function() {
                like.classList.toggle("active");

                if (like.classList.contains("active")) {
                    like.textContent = "♥";
                } else {
                    like.textContent = "♡";
                }
            });
        });

        let themeBtn = document.getElementById("theme-btn");

        themeBtn.addEventListener("click", function() {
            document.body.classList.toggle("dark-theme");

            if (document.body.classList.contains("dark-theme")) {
                themeBtn.textContent = "☀️";
            } else {
                themeBtn.textContent = "🌙";
            }
        });
    </script>

</body>
</html>
